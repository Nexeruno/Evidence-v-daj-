# FÁZA 6.2A: Multi-Service Orchestration for Podman
#
# Minimal multi-service setup:
# - node-backend: Node.js Express server (port 3000)
# - ml-runtime: Python Flask ML server (port 5000)
#
# Commands:
#   podman-compose up              — Start all services
#   podman-compose down            — Stop all services
#   podman-compose logs -f         — Follow logs
#   podman-compose logs backend    — Backend logs only
#   podman-compose logs ml-runtime — Runtime logs only

version: '3.8'

services:
  # Node.js Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    container_name: node-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      ML_RUNTIME_HOST: ml-runtime
      ML_RUNTIME_PORT: 5000
      ML_RUNTIME_ENABLED: "true"
    depends_on:
      ml-runtime:
        condition: service_healthy
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python ML Runtime Service
  ml-runtime:
    build:
      context: .
      dockerfile: ml-runtime/Containerfile
    container_name: ml-runtime
    ports:
      - "5000:5000"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ml-network:
    driver: bridge
