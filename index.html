<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
<title>Evidence výdajů</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <main>

<h1> Evidence příjmů</h1>

<section class="tabulka-prijmu-sekce">
<form class="formulare-prijmu">

<label class="tabulka-prijmu">
<input id="nazev-prijmu" type="text" name="nazev-prijmu" placeholder="Název příjmů">
</label>

<label class="tabulka-prijmu">
<input id="castka-prijmu" type="number" name="castka" placeholder="Částka">
</label>

<input type="date" id="datum-prijmu" class="tabulka-prijmu">

<select id="kategorie-prijmu" class="tabulka-prijmu">
    <option value="prace">Práce</option>
    <option value="brigada">Brigáda</option>
    <option value="prodej">Prodej</option>
    <option value="prispevky">Příspěvky</option>
    <option value="ostatni">Ostaní</option>
</select>

<button id="pridat-prijem-btn" type="button" 
class ="button-prijem">Přidat příjem</button>

</form>
</section>

<div class="celkem-box-prijem">
<h2>Celkem příjmy:</h2>
<p id="celkem-prijmy">0 Kč</p>
</div>

<label>
    Filtrovat podle kategorie:
    <select id="filtr-kategorie-prijmy">
<option value="vse-prijem">Vše</option>
<option value="prace">Práce</option>
<option value="brigada">Brigáda</option>
<option value="prodej">Prodej</option>
<option value="prispevky">Příspěvky</option>
<option value="ostatni">Ostaní</option>
    </select>
</label>

<label>
    Filtrovat podle měsíce:
    <select id="filtr-mesic-prijmy">
<option value="vse-mesic">Vše</option>
<option value="01">Leden</option>
<option value="02">Únor</option>
<option value="03">Březen</option>
<option value="04">Duben</option>
<option value="05">Květen</option>
<option value="06">Červen</option>
<option value="07">Červenec</option>
<option value="08">Srpen</option>
<option value="09">Září</option>
<option value="10">Říjen</option>
<option value="11">Listopad</option>
<option value="12">Prosinec</option>
    </select>
</label>

<section class="seznam-prijmu-sekce">
<h2>Seznam příjmů:</h2>
<div id="seznam-prijmu">
</div>
</section>

<button type="button" id="smazat-vse-prijmy-btn"
class="smazat-vse-btn">
Vymazat Vše
</button>

        <h1> Evidence výdajů</h1>

<section class="tabulka-sekce">
<form class="formulare-sekce">

<label class="tabulka">
<input id="nazev-vydaje" type="text" name="nazev-vydaje" placeholder="Název výdaje">
</label>

<label class="tabulka">
<input id="castka" type="number" name="castka" placeholder="Částka">
</label>

<input type="date" id="datum-vydaje" class="tabulka">

<select id="kategorie" class="tabulka">
    <option value="doprava">Doprava</option>
    <option value="jidlo">Jídlo</option>
    <option value="bydleni">Bydlení</option>
    <option value="sporeni">Spoření</option>
    <option value="zabava">Zábava</option>
    <option value="ostatni">Ostatní</option>
</select>

<button id="pridat-btn" type="button" 
class ="button">Přidat výdaj</button>

</form>
</section>

<div class="celkem-box">
<h2>Celková částka výdajů:</h2>
<p id="celkem">0 Kč</p>
</div>

<label>
    Filtrovat podle kategorie:
    <select id="filtr-kategorie">
<option value="vse">Vše</option>
<option value="doprava">Doprava</option>
<option value="jidlo">Jídlo</option>
<option value="bydleni">Bydlení</option>
<option value="sporeni">Spoření</option>
<option value="zabava">Zábava</option>
<option value="ostatni">Ostatní</option>
    </select>
</label>

<label>
    Filtrovat podle měsíce:
    <select id="filtr-mesic-vydaje">
<option value="vse-mesic">Vše</option>
<option value="01">Leden</option>
<option value="02">Únor</option>
<option value="03">Březen</option>
<option value="04">Duben</option>
<option value="05">Květen</option>
<option value="06">Červen</option>
<option value="07">Červenec</option>
<option value="08">Srpen</option>
<option value="09">Září</option>
<option value="10">Říjen</option>
<option value="11">Listopad</option>
<option value="12">Prosinec</option>
    </select>
</label>

<section class="seznam-sekce">
<h2>Seznam výdajů:</h2>
<div id="seznam-vydaju">
</div>
</section>

<button type="button" id="smazat-vse-btn"
class="smazat-vse-btn">
Vymazat Vše
</button>

<section class="celkem-sekce">
<h1>Souhrn</h1>
<div id="prijmy-celkem"></div>
<div id="vydaje-celkem"></div>
<div id="zustatek"></div>
</section>


</main>

<script src="script.js"></script>
</body>
</html>
